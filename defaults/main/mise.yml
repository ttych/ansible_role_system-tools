---

want_system_tools_mise: yes

# system_tools_mise_version:

system_tools_mise_name: mise
system_tools_mise_github_repo: jdx/mise
system_tools_mise_github_api_url: "https://api.github.com/repos/{{ system_tools_mise_github_repo }}/releases/latest"
system_tools_mise_github_download_url: "https://github.com/{{ system_tools_mise_github_repo }}/releases/download/v{{ system_tools_mise_version }}/{{ system_tools_mise_name }}-v{{ system_tools_mise_version }}-{{ ansible_facts.system | lower }}-{{ system_tools_mise_architectures[ansible_facts.architecture] }}.tar.gz"
system_tools_mise_local_dir: "{{ system_local_dir }}"
system_tools_mise_local_bin_dir: "{{ system_tools_mise_local_dir }}/bin"
system_tools_mise_local_bin: "{{ system_tools_mise_local_bin_dir }}/{{ system_tools_mise_name }}"

system_tools_mise_architectures:
  x86_64: x64
