---

- block:

    - name: check current kubectl
      ansible.builtin.stat:
        path: "{{ system_tools_kubectl_local_bin }}"
      register: t_system_tools_kubectl_local_bin

    - block:

        - name: get latest kubectl version
          ansible.builtin.uri:
            url: "{{ system_tools_kubectl_latest_version_url }}"
            return_content: yes
          register: t_system_tools_kubectl_latest_version
          changed_when: no

        - name: extract latest kubectl version
          ansible.builtin.set_fact:
            system_tools_kubectl_version: "{{ t_system_tools_kubectl_latest_version.content | replace('v', '') }}"

      when: system_tools_kubectl_version is not defined or system_tools_kubectl_version == ""

    - block:

        - name: get current kubectl version
          ansible.builtin.shell:
            cmd: "{{ system_tools_kubectl_local_bin }} version | sed -n 's/^.*Client Version:\\sv\\([0-9.]*\\).*$/\\1/p'"
          register: t_system_tools_kubectl_current_version
          changed_when: no

      when: t_system_tools_kubectl_local_bin.stat.exists

    - block:

        - name: "download {{ system_tools_kubectl_name }} bin"
          ansible.builtin.get_url:
            url: "{{ system_tools_kubectl_download_url }}"
            dest: "{{ system_tools_kubectl_local_bin }}"
            owner: root
            group: root
            mode: '0755'

        - name: "download {{ system_tools_kubectl_convert_name }} bin"
          ansible.builtin.get_url:
            url: "{{ system_tools_kubectl_convert_download_url }}"
            dest: "{{ system_tools_kubectl_convert_local_bin }}"
            owner: root
            group: root
            mode: '0755'

      when: not t_system_tools_kubectl_local_bin.stat.exists or (t_system_tools_kubectl_current_version is defined and t_system_tools_kubectl_current_version.stdout != system_tools_kubectl_version)

  when: want_system_tools_kubectl
